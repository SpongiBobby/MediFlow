logging:
  level:
    org.springframework: debug
    org.springframework.web: debug

spring:
  application:
    name: Sportello

  data:
    web:
      pageable:
        serialization-mode: via_dto

  datasource:
    url: ${SPORTELLO_URL_DB:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPORTELLO_USER_DB:postgres}
    password: ${SPORTELLO_PWD_DB:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    driver-class-name: org.postgresql.Driver
    url: ${SPORTELLO_URL_DB:jdbc:postgresql://localhost:5432/postgres}
    user: ${SPORTELLO_USER_DB:postgres}
    password: ${SPORTELLO_PWD_DB:postgres}

  jpa:
    generate-ddl: false
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

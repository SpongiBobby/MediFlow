<div class="flex flex-col h-dvh bg-slate-100">
  <p-confirmpopup/>
  <p-toast/>
  <div class="flex flex-1 flex-col gap-6 p-4 min-h-0">

    <div class="flex flex-row shrink-0">
      <span class="page-title">Anagrafica Medici</span>
    </div>

    <div class="flex h-full flex-col gap-4 w-full min-h-0">
      <!-- FILTRI DI RICERCA -->
      <p-fieldset
        [toggleable]="true"
        [collapsed]="false"
        legend="Filtri"
      >
        <div class="flex flex-col gap-2">
          <form [formGroup]="searchForm" class="flex flex-col gap-3">
            <div class="flex flex-col md:flex-row gap-4 w-full">

              <div class="input-group">
                <label class="input-label">Codice Fiscale</label>
                <i class="pi pi-id-card"></i>
                <p-auto-complete formControlName="codiceFiscale"
                                 placeholder="Codice Fiscale..."
                                 class="w-full"
                                 inputStyleClass="input-field"
                                 [suggestions]="suggestions()"
                                 (completeMethod)="onSearch($event)" />
              </div>

              <div class="input-group">
                <label class="input-label">Nome</label>
                <i class="pi pi-user"></i>
                <input formControlName="nome" pInputText placeholder="Nome..." class="input-field"/>
              </div>

              <div class="input-group">
                <label class="input-label">Cognome</label>
                <i class="pi pi-user"></i>
                <input formControlName="cognome" pInputText placeholder="Cognome..." class="input-field"/>
              </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 w-full">
              <div class="input-group">
                <label class="input-label">Data di nascita</label>
                <i class="pi pi-calendar"></i>
                <p-date-picker
                  formControlName="dataNascita"
                  dateFormat="dd/mm/yy"
                  placeholder="Seleziona data"
                  [showIcon]="false"
                  appendTo="body"
                  inputStyleClass="input-field" />
              </div>
              <div class="input-group">
                <label class="input-label">Specializzazione</label>
                <i class="pi pi-tag"></i>
                <p-select formControlName="specializzazione" placeholder="Specializzazione..." class="input-field"
                          [options]="specializzazioni()"
                          [optionLabel]="'descrizione'"
                          [optionValue]="'id'"
                />
              </div>
            </div>
          </form>

          <div class="flex justify-end gap-3 pt-4 border-t border-gray-50">
            <button (click)="reset()" class="btn-secondary">
              Reset
            </button>
            <button (click)="search()" class="btn-primary">
              <i class="pi pi-search"></i>
              Ricerca
            </button>
          </div>
        </div>
      </p-fieldset>

      <!-- AGGIUNGI -->
      <div class="flex justify-end pt-2">
        <button (click)="nuovoMedico()" class="btn-primary">
          <i class="pi pi-plus"></i>
          Aggiungi
        </button>
      </div>

      <!-- TABELLA -->
      <label class="section-label">Risultati</label>
      <div class="flex-1 h-full min-h-0 flex flex-col overflow-hidden page-card">
        <p-table
          [value]="medici()"
          [lazy]="true"
          [first]="first()"
          (onLazyLoad)="onLazyLoadHandler($event)"
          [paginator]="true"
          [scrollable]="true"
          [tableStyleClass]="'h-full'"
          [totalRecords]="totalRecords()"
          [loading]="isLoading()"
          [rows]="5"
          scrollHeight="flex">
          <ng-template pTemplate="header">
            <tr>
              <th>Codice Fiscale</th>
              <th>Nome</th>
              <th>Cognome</th>
              <th>Data di nascita</th>
              <th>Specializzazione</th>
              <th class="text-center">Azioni</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-medico>
            <tr>
              <td class="p-2.5 text-sm font-medium text-slate-800">{{ medico.codiceFiscale }}</td>
              <td class="p-2.5 text-sm font-medium text-slate-800">{{ medico.nome }}</td>
              <td class="p-2.5 font-mono text-xs text-slate-500">{{ medico.cognome }}</td>
              <td class="p-2.5 font-mono text-xs text-slate-500">{{ medico.dataDiNascita }}</td>
              <td class="p-2.5 font-mono text-xs text-slate-500">{{ medico.specializzazione.descrizione }}</td>
              <td class="text-center">
                <button (click)="modificaMedico(medico.id)" pTooltip="Apri dettaglio" class="btn-icon">
                  <i class="pi pi-ellipsis-v"></i>
                </button>
                <button (click)="eliminaMedico($event, medico.id)" pTooltip="Elimina" class="btn-icon">
                  <i class="pi pi-trash"></i>
                </button>
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="6" class="text-center py-12!">
                <div class="flex flex-col items-center gap-2">
                  <i class="pi pi-search text-slate-300 text-3xl"></i>
                  <span class="text-slate-400 text-sm">Nessuna anagrafica trovata</span>
                </div>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </div>
  </div>
</div>

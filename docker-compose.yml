services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${USER_DB:postgres}
      POSTGRES_PASSWORD: ${USER_PWD:postgres}
    ports:
      - "5432:5432"
    volumes:
      - ./locale/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - medinet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    networks:
      - medinet

networks:
  medinet:
    driver: bridge